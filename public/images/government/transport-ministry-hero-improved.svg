<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#2a5298;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#87ceeb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="buildGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f4f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Sky Background -->
  <rect width="1600" height="900" fill="url(#skyGrad)"/>
  
  <!-- Tricolour Flag Bar -->
  <rect x="0" y="0" width="1600" height="20" fill="#ff9a00"/>
  <rect x="0" y="20" width="1600" height="20" fill="#ffffff"/>
  <rect x="0" y="40" width="1600" height="20" fill="#138808"/>

  <!-- Sun -->
  <circle cx="200" cy="120" r="60" fill="#fbbf24" opacity="0.9"/>
  <circle cx="200" cy="120" r="65" fill="#fcd34d" opacity="0.5"/>

  <!-- Decorative Clouds -->
  <ellipse cx="150" cy="200" rx="80" ry="45" fill="#ffffff" opacity="0.7" filter="url(#shadow)"/>
  <ellipse cx="280" cy="180" rx="100" ry="50" fill="#ffffff" opacity="0.6" filter="url(#shadow)"/>
  <ellipse cx="1400" cy="250" rx="120" ry="55" fill="#ffffff" opacity="0.7" filter="url(#shadow)"/>
  <ellipse cx="1200" cy="180" rx="90" ry="48" fill="#ffffff" opacity="0.5" filter="url(#shadow)"/>

  <!-- Main Government Building -->
  <g filter="url(#shadow)">
    <!-- Building left wing -->
    <rect x="350" y="320" width="200" height="350" fill="url(#buildGrad)" stroke="#cbd5e1" stroke-width="2"/>
    <!-- Building center -->
    <rect x="550" y="280" width="500" height="390" fill="url(#buildGrad)" stroke="#cbd5e1" stroke-width="2"/>
    <!-- Building right wing -->
    <rect x="1050" y="320" width="200" height="350" fill="url(#buildGrad)" stroke="#cbd5e1" stroke-width="2"/>
    
    <!-- Pitched Roof Center -->
    <polygon points="550,280 800,150 1050,280" fill="url(#roofGrad)"/>
    <polygon points="550,280 800,150 1050,280" fill="none" stroke="#7f1d1d" stroke-width="1"/>
    
    <!-- Central Dome -->
    <circle cx="800" cy="160" r="50" fill="#dc2626" stroke="#991b1b" stroke-width="2"/>
    <path d="M 800 110 Q 820 95 840 110" fill="none" stroke="#fcd34d" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Windows Pattern - organized grid -->
    <g fill="#cbd5e1" stroke="#64748b" stroke-width="1">
      <!-- Left wing windows -->
      <rect x="370" y="350" width="35" height="35" rx="2"/>
      <rect x="420" y="350" width="35" height="35" rx="2"/>
      <rect x="370" y="410" width="35" height="35" rx="2"/>
      <rect x="420" y="410" width="35" height="35" rx="2"/>
      <rect x="370" y="470" width="35" height="35" rx="2"/>
      <rect x="420" y="470" width="35" height="35" rx="2"/>
      
      <!-- Center wing windows - 3 rows -->
      <rect x="580" y="330" width="40" height="40" rx="2"/>
      <rect x="640" y="330" width="40" height="40" rx="2"/>
      <rect x="700" y="330" width="40" height="40" rx="2"/>
      <rect x="760" y="330" width="40" height="40" rx="2"/>
      <rect x="820" y="330" width="40" height="40" rx="2"/>
      <rect x="880" y="330" width="40" height="40" rx="2"/>
      <rect x="940" y="330" width="40" height="40" rx="2"/>
      
      <rect x="580" y="410" width="40" height="40" rx="2"/>
      <rect x="640" y="410" width="40" height="40" rx="2"/>
      <rect x="700" y="410" width="40" height="40" rx="2"/>
      <rect x="760" y="410" width="40" height="40" rx="2"/>
      <rect x="820" y="410" width="40" height="40" rx="2"/>
      <rect x="880" y="410" width="40" height="40" rx="2"/>
      <rect x="940" y="410" width="40" height="40" rx="2"/>
      
      <rect x="580" y="490" width="40" height="40" rx="2"/>
      <rect x="640" y="490" width="40" height="40" rx="2"/>
      <rect x="700" y="490" width="40" height="40" rx="2"/>
      <rect x="760" y="490" width="40" height="40" rx="2"/>
      <rect x="820" y="490" width="40" height="40" rx="2"/>
      <rect x="880" y="490" width="40" height="40" rx="2"/>
      <rect x="940" y="490" width="40" height="40" rx="2"/>
      
      <!-- Right wing windows -->
      <rect x="1070" y="350" width="35" height="35" rx="2"/>
      <rect x="1120" y="350" width="35" height="35" rx="2"/>
      <rect x="1070" y="410" width="35" height="35" rx="2"/>
      <rect x="1120" y="410" width="35" height="35" rx="2"/>
      <rect x="1070" y="470" width="35" height="35" rx="2"/>
      <rect x="1120" y="470" width="35" height="35" rx="2"/>
    </g>
    
    <!-- Main Entrance Gate -->
    <rect x="720" y="600" width="160" height="100" rx="8" fill="#0f172a" stroke="#fbbf24" stroke-width="3"/>
    <rect x="735" y="615" width="130" height="70" fill="#1e293b"/>
    <circle cx="800" cy="650" r="8" fill="#fbbf24"/>
    
    <!-- Flag poles -->
    <rect x="450" y="200" width="8" height="150" fill="#8b7355"/>
    <polygon points="458,210 458,230 490,220" fill="#ff9a00"/>
    
    <rect x="1142" y="200" width="8" height="150" fill="#8b7355"/>
    <polygon points="1150,210 1150,230 1182,220" fill="#138808"/>
  </g>
  
  <!-- Road/Highway -->
  <g>
    <rect x="0" y="680" width="1600" height="220" fill="#3d3d3d"/>
    <!-- Road stripes -->
    <line x1="30" y1="790" x2="1570" y2="790" stroke="#fbbf24" stroke-width="8" stroke-dasharray="40,60"/>
    <!-- Shoulders -->
    <rect x="0" y="680" width="1600" height="15" fill="#525252"/>
  </g>
      <rect x="410" y="130" width="60" height="60" rx="4"/>
      <rect x="500" y="130" width="60" height="60" rx="4"/>
      <rect x="590" y="130" width="60" height="60" rx="4"/>
      <rect x="680" y="130" width="60" height="60" rx="4"/>
    </g>
    
    <!-- Window Rows -->
    <g fill="#0ea5e9" opacity="0.3">
      <rect x="60" y="140" width="40" height="40" rx="2"/>
      <rect x="150" y="140" width="40" height="40" rx="2"/>
      <rect x="240" y="140" width="40" height="40" rx="2"/>
      <rect x="330" y="140" width="40" height="40" rx="2"/>
      <rect x="420" y="140" width="40" height="40" rx="2"/>
      <rect x="510" y="140" width="40" height="40" rx="2"/>
      <rect x="600" y="140" width="40" height="40" rx="2"/>
      <rect x="690" y="140" width="40" height="40" rx="2"/>
    </g>

    <!-- Flag Pole -->
    <rect x="375" y="0" width="50" height="100" fill="#8b4513"/>
    <polygon points="425,20 425,50 460,35" fill="#f97316"/>
  </g>

  <!-- Road/Highway Section -->
  <polygon points="0,550 0,900 1600,900 1600,550 1200,500 400,500" fill="#374151"/>
  <polygon points="0,560 0,900 1600,900 1600,560 1200,510 400,510" fill="#4b5563"/>

  <!-- Road Markings -->
  <rect x="775" y="570" width="50" height="330" rx="25" fill="#fbbf24" opacity="0.8"/>
  <line x1="800" y1="570" x2="800" y2="900" stroke="#fbbf24" stroke-width="8" stroke-dasharray="40,50" opacity="0.6"/>

  <!-- Highway Sign Left -->
  <g transform="translate(150, 450)">
    <rect x="0" y="0" width="220" height="140" rx="12" fill="#1d4ed8" stroke="#ffffff" stroke-width="3"/>
    <text x="110" y="60" text-anchor="middle" fill="#ffffff" font-size="28" font-family="Arial, sans-serif" font-weight="bold">NATIONAL</text>
    <text x="110" y="105" text-anchor="middle" fill="#fbbf24" font-size="24" font-family="Arial, sans-serif" font-weight="bold">HIGHWAY</text>
  </g>

  <!-- Service Center Sign Right -->
  <g transform="translate(1230, 450)">
    <rect x="0" y="0" width="220" height="140" rx="12" fill="#059669" stroke="#ffffff" stroke-width="3"/>
    <text x="110" y="55" text-anchor="middle" fill="#ffffff" font-size="26" font-family="Arial, sans-serif" font-weight="bold">RTO DIGITAL</text>
    <text x="110" y="105" text-anchor="middle" fill="#fbbf24" font-size="24" font-family="Arial, sans-serif" font-weight="bold">SERVICES</text>
  </g>

  <!-- Hero Text -->
  <text x="100" y="100" fill="#ffffff" font-size="52" font-family="Arial, sans-serif" font-weight="bold">
    Ministry of Road Transport
  </text>
  <text x="100" y="160" fill="#ffffff" font-size="52" font-family="Arial, sans-serif" font-weight="bold">
    and Highways
  </text>
  <text x="100" y="215" fill="#dbeafe" font-size="28" font-family="Arial, sans-serif" font-weight="500">
    Citizen-First Digital Mobility Services
  </text>

  <!-- Decorative Lines -->
  <line x1="100" y1="235" x2="500" y2="235" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
</svg>
