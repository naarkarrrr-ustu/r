<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">RTO Command Center</title>
  <desc id="desc">Official style regional transport office and citizen service center illustration</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0ecff" />
      <stop offset="100%" stop-color="#f7fbff" />
    </linearGradient>
    <linearGradient id="building" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)" />
  <rect x="0" y="0" width="1200" height="10" fill="#f97316" />
  <rect x="0" y="10" width="1200" height="10" fill="#ffffff" />
  <rect x="0" y="20" width="1200" height="10" fill="#16a34a" />

  <g transform="translate(200 170)">
    <rect x="0" y="120" width="800" height="340" rx="16" fill="url(#building)" />
    <rect x="24" y="146" width="752" height="290" rx="12" fill="#f8fafc" />

    <rect x="334" y="86" width="132" height="44" rx="10" fill="#1e293b" />
    <text x="400" y="114" text-anchor="middle" fill="#f8fafc" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="700">STATE RTO</text>

    <g fill="#2563eb" opacity="0.9">
      <rect x="72" y="186" width="124" height="190" rx="8" />
      <rect x="234" y="186" width="124" height="190" rx="8" />
      <rect x="396" y="186" width="124" height="190" rx="8" />
      <rect x="558" y="186" width="124" height="190" rx="8" />
    </g>

    <rect x="330" y="372" width="140" height="64" rx="8" fill="#0f172a" />
  </g>

  <g transform="translate(80 520)">
    <rect x="0" y="0" width="260" height="124" rx="16" fill="#1d4ed8" />
    <text x="130" y="54" text-anchor="middle" fill="#ffffff" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">LL - DL - IDP</text>
    <text x="130" y="86" text-anchor="middle" fill="#dbeafe" font-size="16" font-family="Inter, Arial, sans-serif" font-weight="600">All services online</text>
  </g>

  <g transform="translate(860 520)">
    <rect x="0" y="0" width="260" height="124" rx="16" fill="#166534" />
    <text x="130" y="54" text-anchor="middle" fill="#ffffff" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">MOBILE FIRST</text>
    <text x="130" y="86" text-anchor="middle" fill="#dcfce7" font-size="16" font-family="Inter, Arial, sans-serif" font-weight="600">Citizen assistance desk</text>
  </g>

  <text x="84" y="110" fill="#0f172a" font-size="38" font-family="Inter, Arial, sans-serif" font-weight="800">
    Regional Transport Office Service Command Center
  </text>
</svg>
