<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320" role="img" aria-labelledby="title desc">
  <title id="title">Government Transport Emblem</title>
  <desc id="desc">Official style emblem for Ministry of Road Transport and Highways</desc>
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f3d27a" />
      <stop offset="100%" stop-color="#bb8a2f" />
    </linearGradient>
    <linearGradient id="ring" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
  </defs>

  <rect width="320" height="320" rx="40" fill="#ffffff" />
  <circle cx="160" cy="160" r="146" fill="none" stroke="#f97316" stroke-width="10" />
  <circle cx="160" cy="160" r="132" fill="none" stroke="#ffffff" stroke-width="8" />
  <circle cx="160" cy="160" r="120" fill="none" stroke="#16a34a" stroke-width="10" />
  <circle cx="160" cy="160" r="100" fill="#fffdf7" stroke="url(#ring)" stroke-width="4" />

  <g transform="translate(160 156)">
    <circle cx="0" cy="-28" r="14" fill="url(#gold)" />
    <circle cx="-22" cy="-18" r="11" fill="url(#gold)" />
    <circle cx="22" cy="-18" r="11" fill="url(#gold)" />
    <rect x="-32" y="-12" width="64" height="54" rx="8" fill="url(#gold)" />
    <rect x="-38" y="42" width="76" height="10" rx="5" fill="#8c5e14" />

    <g fill="none" stroke="#8c5e14" stroke-width="3">
      <line x1="-18" y1="-4" x2="-18" y2="38" />
      <line x1="-6" y1="-4" x2="-6" y2="38" />
      <line x1="6" y1="-4" x2="6" y2="38" />
      <line x1="18" y1="-4" x2="18" y2="38" />
    </g>

    <circle cx="0" cy="66" r="20" fill="#ffffff" stroke="#1d4ed8" stroke-width="4" />
    <g stroke="#1d4ed8" stroke-width="1.8">
      <line x1="0" y1="48" x2="0" y2="84" />
      <line x1="-18" y1="66" x2="18" y2="66" />
      <line x1="-13" y1="53" x2="13" y2="79" />
      <line x1="13" y1="53" x2="-13" y2="79" />
    </g>
  </g>

  <text x="160" y="44" text-anchor="middle" fill="#0f172a" font-size="14" font-family="Inter, Arial, sans-serif" font-weight="700" letter-spacing="1.1">
    GOVERNMENT OF INDIA
  </text>
  <text x="160" y="284" text-anchor="middle" fill="#0f172a" font-size="11" font-family="Inter, Arial, sans-serif" font-weight="700" letter-spacing="0.55">
    MINISTRY OF ROAD TRANSPORT AND HIGHWAYS
  </text>
</svg>
