<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Transport Ministry Hero Background</title>
  <desc id="desc">Official style government transport scene with ministry building and national highway</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8ddf6" />
      <stop offset="65%" stop-color="#e8f1fc" />
      <stop offset="100%" stop-color="#f8fbff" />
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#55657b" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#dbeafe" />
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)" />
  <rect x="0" y="0" width="1600" height="14" fill="#f97316" />
  <rect x="0" y="14" width="1600" height="14" fill="#ffffff" />
  <rect x="0" y="28" width="1600" height="14" fill="#16a34a" />

  <g opacity="0.45">
    <circle cx="220" cy="140" r="72" fill="#ffffff" />
    <circle cx="1340" cy="170" r="88" fill="#ffffff" />
    <circle cx="1200" cy="110" r="34" fill="#ffffff" />
  </g>

  <rect x="0" y="410" width="1600" height="160" fill="#dbeafe" opacity="0.7" />

  <g transform="translate(490 260)">
    <rect x="0" y="120" width="620" height="230" rx="12" fill="#334155" />
    <rect x="18" y="138" width="584" height="190" rx="10" fill="url(#glass)" />
    <rect x="260" y="84" width="100" height="44" rx="8" fill="#1e293b" />
    <rect x="240" y="90" width="140" height="32" rx="6" fill="#0ea5e9" opacity="0.23" />
    <rect x="0" y="350" width="620" height="22" fill="#111827" />

    <g fill="#1e293b" opacity="0.95">
      <rect x="50" y="166" width="74" height="150" rx="4" />
      <rect x="148" y="166" width="74" height="150" rx="4" />
      <rect x="246" y="166" width="74" height="150" rx="4" />
      <rect x="344" y="166" width="74" height="150" rx="4" />
      <rect x="442" y="166" width="74" height="150" rx="4" />
      <rect x="540" y="166" width="30" height="150" rx="4" />
    </g>
  </g>

  <polygon points="640,530 960,530 1220,900 380,900" fill="url(#road)" />
  <rect x="778" y="560" width="44" height="340" rx="22" fill="#f8fafc" opacity="0.85" />

  <g fill="#f8fafc" opacity="0.95">
    <rect x="594" y="646" width="30" height="110" rx="15" transform="rotate(22 594 646)" />
    <rect x="1002" y="646" width="30" height="110" rx="15" transform="rotate(-22 1002 646)" />
  </g>

  <g transform="translate(120 520)">
    <rect x="0" y="0" width="210" height="120" rx="14" fill="#1e3a8a" />
    <rect x="18" y="18" width="174" height="84" rx="10" fill="#f8fafc" />
    <text x="106" y="58" text-anchor="middle" fill="#0f172a" font-size="21" font-family="Inter, Arial, sans-serif" font-weight="700">RTO</text>
    <text x="106" y="84" text-anchor="middle" fill="#2563eb" font-size="14" font-family="Inter, Arial, sans-serif" font-weight="600">DIGITAL SERVICES</text>
  </g>

  <g transform="translate(1270 520)">
    <rect x="0" y="0" width="210" height="120" rx="14" fill="#14532d" />
    <rect x="18" y="18" width="174" height="84" rx="10" fill="#f8fafc" />
    <text x="106" y="54" text-anchor="middle" fill="#166534" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="700">NATIONAL</text>
    <text x="106" y="80" text-anchor="middle" fill="#166534" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="700">HIGHWAY</text>
  </g>

  <text x="90" y="118" fill="#0f172a" font-size="44" font-family="Inter, Arial, sans-serif" font-weight="800">
